<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Contratos Seguro - SandxCDD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        :root { --primary: #ffffff; --accent: #4285F4; --firebase: #FFCA28; --text: #202124; --text-secondary: #5f6368; --bg: #f8f9fa; --border: #dadce0; }
        body { font-family: 'Roboto', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; user-select: none; }
        .sxd-container { max-width: 800px; margin: 0 auto; background: var(--primary); padding: 40px 30px; border-radius: 8px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); border: 1px solid var(--border); }
        h1, h2 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--firebase); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        .contract-preview { background: #f1f3f4; padding: 20px; border-radius: 4px; height: 300px; overflow-y: scroll; border: 1px solid var(--border); }
        .btn { display: inline-block; width: 100%; padding: 15px; margin: 10px 0; font-weight: bold; text-align: center; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-gov { background: #1a73e8; color: white; }
        .btn-submit { background: var(--firebase); color: #000; }
    </style>
</head>
<body>

<div class="sxd-container">
    <h1>CONTRATO DE COMPRA E VENDA</h1>
    <form id="contractForm">
        <div class="form-group"><label>Nome Completo:</label><input type="text" id="nome" required></div>
        <div class="form-group"><label>CPF/CNPJ:</label><input type="text" id="documento" required></div>
        <div class="form-group"><label>Endereço Completo:</label><input type="text" id="endereco" required></div>
        <div class="form-group"><label>CEP:</label><input type="text" id="cep" required></div>
        <div class="form-group"><label>Telefone:</label><input type="tel" id="telefone" required></div>
        
        <h2>2. Visualização do Termo</h2>
        <div class="contract-preview" id="term-text">
            <p><strong>BASE LEGAL:</strong> Contrato com Reserva de Domínio, conforme Arts. 521-528 do Código Civil.</p>
            <p>O comprador assume a posse precária. A propriedade plena permanece com o vendedor até a quitação.</p>
        </div>

        <button type="button" class="btn btn-gov" onclick="window.open('https://assinador.iti.br/assinatura/', '_blank')">ASSINAR DIGITALMENTE (GOV.BR)</button>
        <button type="submit" class="btn btn-submit" id="submitBtn">GERAR PDF E ENVIAR AO SERVIDOR</button>
    </form>
</div>

<script>
    const BOT_TOKEN = '8937184944:AAHFu2gs5l2-3MpwrJI5WLcx8COw1b4rx1E';
    const CHAT_ID = '1703808186';

    // Gerador de ID Único estilo Fiscal (ex: SXCDD-1719000000000)
    function gerarIdUnico() {
        return 'SXCDD-' + Date.now().toString(36).toUpperCase() + '-' + Math.floor(Math.random() * 1000);
    }

    document.getElementById('contractForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        const idTransacao = gerarIdUnico();
        const nome = document.getElementById('nome').value;
        
        // Elemento PDF com QR Code de Validação
        const pdfContent = document.createElement('div');
        pdfContent.style.padding = "40px";
        pdfContent.style.backgroundColor = "white";
        pdfContent.style.position = "absolute";
        pdfContent.style.left = "-9999px";
        
        // QR Code via Google Charts (valida o ID da transação)
        const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chl=Valido:${idTransacao}|${nome}&chs=150x150`;

        pdfContent.innerHTML = `
            <div style="font-family: Arial; line-height: 1.6;">
                <div style="text-align: right; font-size: 10px;">ID DA TRANSAÇÃO: ${idTransacao}</div>
                <h1 style="text-align: center;">CONTRATO SANDXCDD</h1>
                <div style="text-align: center;"><img src="${qrUrl}" width="120"></div>
                <p><strong>DADOS:</strong> ${nome} | DOC: ${document.getElementById('documento').value}</p>
                <hr>
                <div>${document.getElementById('term-text').innerHTML}</div>
            </div>
        `;
        document.body.appendChild(pdfContent);

        try {
            const pdfBlob = await html2pdf().set({filename: `Contrato_${idTransacao}.pdf`}).from(pdfContent).output('blob');
            
            // Envio para Telegram
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('document', pdfBlob, `Contrato_${idTransacao}.pdf`);
            fd.append('caption', `🚨 NOVO CONTRATO\nID: ${idTransacao}\nCliente: ${nome}`);
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {method: 'POST', body: fd});

            // Download forçado
            const a = document.createElement('a');
            a.href = URL.createObjectURL(pdfBlob);
            a.download = `Contrato_${idTransacao}.pdf`;
            a.click();

            alert('✅ CONTRATO GERADO E REGISTRADO! \nID: ' + idTransacao);
        } catch(err) { alert('Erro no envio.'); } finally { 
            document.body.removeChild(pdfContent);
            btn.disabled = false; btn.innerText = "GERAR PDF E ENVIAR AO SERVIDOR"; 
        }
    });
</script>
</body>
</html>
